# AVP 上半身遥操环境（avp_teleop / avp_teleop_dual / avp_teleop_upper_body 共用）
#
# 一键复现：
#   conda env create -f environment.yml
#   conda activate AVP
#   python -c "import pinocchio, pink, qpsolvers, mujoco, avp_stream; print('ok')"
#   python -m avp_teleop_upper_body.selfcheck     # 应看到 9/9 checks passed.
#
# 说明：pinocchio / pink / qpsolvers / quadprog 走 conda-forge（pip 装 pinocchio 很麻烦），
# 其余纯 python 依赖（avp_stream / aiortc / flask ...）走 pip。
name: AVP
channels:
  - conda-forge
dependencies:
  - python=3.11
  # ---- 机器人 IK 核心（务必来自 conda-forge）----
  - pinocchio=4.0.0
  - pink=4.2.0
  - qpsolvers=4.12.0
  - quadprog=0.1.13
  # ---- 数值 ----
  - numpy=2.4.*
  - scipy=1.17.*
  # ---- pip-only 依赖 ----
  - pip
  - pip:
      - -r requirements.txt
